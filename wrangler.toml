# Cloudflare static Pages config.
#
# This file tells Wrangler (which Cloudflare's "Workers Builds" pipeline
# invokes via `npx wrangler deploy` after the build step) that this repo
# is a static-only Pages project and that the assembled build output
# lives in ./dist (produced by `pnpm build` -> tools/assemble-dist.mjs).
#
# Without this file, Wrangler treats the repo as a Workers project and
# fails on the pnpm workspace at the root with:
#   "The Wrangler application detection logic has been run in the root
#    of a workspace instead of targeting a specific project."
#
# The `name` should match the Cloudflare Pages project name in the
# dashboard. Adjust if the project was created under a different name.
name = "games"
compatibility_date = "2024-09-25"
pages_build_output_dir = "./dist"
